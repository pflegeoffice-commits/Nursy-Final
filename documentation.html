<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nursy – Dokumentation</title>
  <link rel="stylesheet" href="styles.css?v=20260307-docdash3" />
</head>
<body data-page="documentation">
<header class="topbar">
  <div class="container topbar__inner">
    <a class="brand" href="index.html" aria-label="Nursy Startseite">
      <span class="brand__dot" aria-hidden="true"></span>
      <span class="brand__text"><strong>Nursy</strong><span>Pflege mit Herz</span></span>
    </a>
    <nav class="nav" aria-label="Hauptnavigation">
      <a href="dashboard-care.html">Dashboard</a>
      <a href="patients.html">Meine Patienten</a>
      <a href="pflegeplanung.html">Pflegeplanung</a>
    </nav>
  </div>
</header>

<main class="container docdash">
  <section class="card docdash__panel">
    <div class="docdash__head">
      <div class="docdash__titlewrap">
        <h1 class="docdash__title">Dokumentation</h1>
        <div class="docdash__patientmeta">
          <span>Pat. Name: <strong id="docPatientName">—</strong></span>
          <span>Geb. Datum: <strong id="docPatientDob">—</strong></span>
        </div>
      </div>
      <div class="docdash__headactions">
        <label class="field docdash__field">
          <span class="field__label">Pat. auswählen</span>
          <select class="control" id="docPatientSelect"></select>
        </label>
        <a class="control btn btn--ghost docdash__back" href="dashboard-care.html">Zurück</a>
      </div>
    </div>

    <div class="docdash__curve card">
      <div class="docdash__curvehead">
        <h2>Vitalkurve</h2>
        <div class="docdash__legend">
          <span><i class="docdash__legendline"></i> RR systole</span>
          <span><i class="docdash__legendline docdash__legendline--dash"></i> RR diastole</span>
          <span><i class="docdash__legenddot"></i> Messpunkte</span>
        </div>
      </div>
      <canvas id="vitalsChart" height="280"></canvas>
    </div>

    <div class="docdash__values card">
      <div class="docdash__valuesgrid">
        <div class="docdash__value"><span class="muted">RR</span><strong id="lastRR">—</strong></div>
        <div class="docdash__value"><span class="muted">Puls</span><strong id="lastPulse">—</strong></div>
        <div class="docdash__value"><span class="muted">O₂</span><strong id="lastO2">—</strong></div>
        <div class="docdash__value"><span class="muted">BZ</span><strong id="lastBZ">—</strong></div>
        <div class="docdash__value"><span class="muted">VAS</span><strong id="lastVAS">—</strong></div>
      </div>
      <button class="control btn btn--primary docdash__newbtn" type="button" id="openVitalsEntry">Neue eintragen</button>
    </div>

    <div class="docdash__rows">
      <button class="docdash__rowbtn" type="button" id="openTasks"><span>Durchführungsnachweis</span><strong>Öffnen</strong></button>
      <button class="docdash__rowbtn" type="button" id="openNotes"><span>Dokumentation</span><strong>Öffnen</strong></button>
      <button class="docdash__rowbtn" type="button" id="openArchive"><span>Archiv</span><strong>Öffnen</strong></button>
    </div>
  </section>
</main>

<div class="modal" id="docModal" hidden>
  <div class="modal__backdrop" data-close-doc></div>
  <div class="modal__panel">
    <div class="modal__head">
      <h3 id="docModalTitle">Eintrag</h3>
      <button class="iconbtn" type="button" data-close-doc>×</button>
    </div>
    <div class="modal__body docmodal__body" id="docModalBody"></div>
    <div class="modal__actions" id="docModalActions"></div>
  </div>
</div>

<footer class="footer">
  <div class="container footer__inner">
    <span class="muted">© Nursy – Pflege mit Herz</span>
    <div class="footer__links"><a href="#">Impressum</a><a href="#">Datenschutz</a></div>
  </div>
</footer>

<script src="documentation.js?v=20260307-docdash3"></script>
</body>
</html>
